<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archipelago Web Panel</title>

<style>
:root {
  --bg: #05070f;
  --panel: rgba(10, 16, 40, 0.85);
  --panel2: rgba(20, 30, 70, 0.85);

  --text: #e6f1ff;
  --muted: #6f89b0;

  --accent: #00eaff;
  --accent2: #ff2bd6;

  --good: #00ff9c;
  --bad: #ff4d6d;

  --border: rgba(0, 234, 255, 0.25);
}

* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  min-height: 100%;
}

body {
  font-family: Inter, system-ui, Arial, sans-serif;
  background: linear-gradient(180deg, #08101d, #0e1730 50%, #111936);
  background-attachment: fixed;
  color: var(--text);
}

.wrap {
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}

/* =========================
   STATUS (FIXED + ENHANCED)
   ========================= */

.status {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px;
  border: 1px solid var(--border);
  border-radius: 999px;
  background: rgba(255,255,255,0.03);
  color: var(--muted);
  font-size: 14px;
  max-width: 460px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: border-color 0.2s ease, box-shadow 0.2s ease, color 0.2s ease;
}

.status::before {
  content: "";
  width: 10px;
  height: 10px;
  border-radius: 999px;
  flex: 0 0 10px;
  background: #6b7280;
  box-shadow: 0 0 0 0 rgba(107, 114, 128, 0.45);
}

/* CONNECTED */
.status.good {
  color: var(--text);
  border-color: rgba(0, 255, 156, 0.6);

  box-shadow:
    0 0 8px rgba(0,255,156,0.4),
    0 0 20px rgba(0,255,156,0.2);
}

.status.good::before {
  background: #00ff9c;
  box-shadow: 0 0 8px #00ff9c, 0 0 16px #00ff9c;
}

/* DISCONNECTED / ERROR */
.status.bad {
  color: #ffd4d4;
  border-color: rgba(255, 143, 143, 0.45);
  box-shadow: 0 0 0 1px rgba(255, 143, 143, 0.08), 0 8px 24px rgba(0,0,0,0.15);
}

.status.bad::before {
  background: var(--bad);
}

/* CONNECTING */
.status.connecting {
  color: #dbeafe;
  border-color: rgba(126, 182, 255, 0.45);
  box-shadow: 0 0 0 1px rgba(126, 182, 255, 0.08), 0 8px 24px rgba(0,0,0,0.15);
}

.status.connecting::before {
  width: 12px;
  height: 12px;
  background: transparent;
  border: 2px solid rgba(126, 182, 255, 0.35);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: statusSpin 0.8s linear infinite;
  box-shadow: none;
}

/* Animations */
@keyframes statusPulse {
  0% { box-shadow: 0 0 0 0 rgba(115, 226, 167, 0.55); }
  70% { box-shadow: 0 0 0 8px rgba(115, 226, 167, 0); }
  100% { box-shadow: 0 0 0 0 rgba(115, 226, 167, 0); }
}

@keyframes statusSpin {
  to { transform: rotate(360deg); }
}

/* =========================
   LAYOUT / UI
   ========================= */

.grid {
  display: grid;
  grid-template-columns: 380px 1fr 360px;
  gap: 16px;
  align-items: start;
}

.card {
  display: flex;
  flex-direction: column;
  background: rgba(10, 16, 40, 0.65);
  border: 1px solid rgba(0, 234, 255, 0.25);
  border-radius: 16px;
  padding: 16px;

  backdrop-filter: blur(10px);

  box-shadow:
    0 0 0 1px rgba(0, 234, 255, 0.08),
    0 0 20px rgba(0, 234, 255, 0.08),
    0 10px 40px rgba(0,0,0,0.6);
}

.card.stack > * + * {
  margin-top: 12px;
}

h1, h2 {
  margin: 0 0 12px;
}

h1 {
  font-size: 24px;
}

h2 {
  font-size: 18px;
}

label {
  display: block;
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 6px;
}

input, select, button, textarea {
  width: 100%;
  min-width: 0;
  border-radius: 12px;
  border: 1px solid rgba(0, 234, 255, 0.25);
  background: rgba(10, 16, 40, 0.9);
  color: var(--text);
  padding: 10px 12px;
  font: inherit;
}

input:focus, select:focus {
  outline: none;
  border-color: #00eaff;
  box-shadow: 0 0 8px rgba(0,234,255,0.5);
}

button {
  background: linear-gradient(90deg, #005bff, #00eaff);
  color: #fff;

  box-shadow:
    0 0 10px rgba(0,234,255,0.4),
    inset 0 0 8px rgba(255,255,255,0.1);
}

button:hover {
  transform: translateY(-1px);
  box-shadow:
    0 0 14px rgba(0,234,255,0.7),
    0 0 28px rgba(0,234,255,0.4);
}

textarea {
  min-height: 120px;
  resize: vertical;
}

button {
  cursor: pointer;
  background: linear-gradient(180deg, #2c62ba, #274f95);
  border: none;
  font-weight: 600;
}

button.secondary {
  background: #222b52;
  border: 1px solid var(--border);
}

.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}

.muted {
  color: var(--muted);
}

.good {
  color: var(--good);
}

.bad {
  color: var(--bad);
}

.small {
  font-size: 12px;
}

.list {
  overflow: auto;
  padding-right: 4px;
}

.item {
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: rgba(255,255,255,0.03);
  margin-bottom: 8px;
  overflow-wrap: anywhere;
  word-break: break-word;
}

/* Players */
.players-section {
  display: block;
}

#players.list {
  overflow: visible;
  max-height: none;
  padding-right: 0;
}

.players-placeholder {
  text-align: center;
  padding: 24px 8px;
}

/* Log */
.log {
  position: relative;
  height: 600px;
  overflow-y: auto;
  overflow-x: hidden;
  white-space: pre-wrap;

  background: rgba(2, 6, 17, 0.58);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);

  border-radius: 14px;
  padding: 12px;
  border: 1px solid rgba(0, 234, 255, 0.22);

  box-shadow:
    inset 0 0 20px rgba(0, 234, 255, 0.06),
    0 0 18px rgba(0, 234, 255, 0.10),
    0 10px 30px rgba(0,0,0,0.35);

  color: #bfe7ff;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 12px;
  line-height: 1.45;
  
}

.log::before,
.log::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  border-radius: inherit;
}

.log::before {
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.045) 0px,
      rgba(255,255,255,0.045) 1px,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,0) 4px
    );
  mix-blend-mode: soft-light;
  opacity: 0.28;
}

.log::after {
  background:
    linear-gradient(rgba(0, 234, 255, 0.05), rgba(255, 43, 214, 0.03)),
    radial-gradient(circle at center, rgba(255,255,255,0.04), transparent 70%);
  opacity: 0.45;
}

.log {
  animation: crtFlicker 6s infinite;
}

@keyframes crtFlicker {
  0%, 100% { opacity: 1; }
  2% { opacity: 0.985; }
  3% { opacity: 0.998; }
  7% { opacity: 0.992; }
  8% { opacity: 1; }
  52% { opacity: 0.996; }
  53% { opacity: 0.989; }
  54% { opacity: 1; }
}

.log::after {
  background:
    radial-gradient(circle at center, transparent 55%, rgba(0,0,0,0.28) 100%),
    linear-gradient(rgba(0, 234, 255, 0.05), rgba(255, 43, 214, 0.03));
  opacity: 0.55;
}

/* Right column */
.right-card {
  height: 600px;
  min-height: 600px;
}

.items-section {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
}

#items.list {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
  max-height: 100%;
}

/* Scrollbars */
.list::-webkit-scrollbar,
.log::-webkit-scrollbar {
  width: 10px;
}

.list::-webkit-scrollbar-track,
.log::-webkit-scrollbar-track {
  background: rgba(255,255,255,0.04);
  border-radius: 999px;
}

.list::-webkit-scrollbar-thumb,
.log::-webkit-scrollbar-thumb {
  background: #31427e;
  border-radius: 999px;
}

.list::-webkit-scrollbar-thumb:hover,
.log::-webkit-scrollbar-thumb:hover {
  background: #3d539d;
}

/* Progress bar */
.progress-bar {
  height: 8px;
  background: rgba(255,255,255,0.08);
  border-radius: 999px;
  overflow: hidden;
  margin-top: 6px;
}

.progress-bar {
  position: relative;
  height: 14px;
  background: rgba(0, 0, 0, 0.6);
  border-radius: 999px;
  overflow: hidden;
  border: 1px solid rgba(0, 234, 255, 0.25);

  box-shadow:
    inset 0 0 10px rgba(0, 234, 255, 0.08),
    0 0 12px rgba(0, 234, 255, 0.15);
}
.progress-fill.bump {
  box-shadow:
    0 0 14px #00ffcc,
    0 0 30px #00ffcc,
    0 0 60px rgba(0,255,200,0.8);
  filter: brightness(1.2);
}

.progress-fill::before {
  content: "";
  position: absolute;
  inset: 0;

  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.35),
    transparent
  );

  animation: neonSweep 2s linear infinite;
}

@keyframes neonSweep {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(200%); }
}

.progress-fill {
  position: relative;
  height: 100%;
  width: 0%;

  background: linear-gradient(
    90deg,
    #00eaff,
    #00ff9c,
    #7cff00
  );

  box-shadow:
    0 0 10px #00ffcc,
    0 0 20px rgba(0,255,200,0.6);

  transition:
    width 0.8s cubic-bezier(0.22, 1, 0.36, 1),
    box-shadow 0.25s ease;

  overflow: hidden;
}

.progress-fill::after {
  content: "";
  position: absolute;
  top: 0;
  right: -30%;
  width: 30%;
  height: 100%;
  background: linear-gradient(
    90deg,
    rgba(255,255,255,0),
    rgba(255,255,255,0.28),
    rgba(255,255,255,0)
  );
  animation: progressShimmer 2s linear infinite;
}

@keyframes progressShimmer {
  from {
    transform: translateX(0);
  }
  to {
    transform: translateX(-350%);
  }
}

/* Responsive */
@media (max-width: 1100px) {
  .grid {
    grid-template-columns: 1fr;
  }

  .log,
  .right-card {
    height: auto;
    min-height: 0;
  }

  #items.list {
    max-height: 320px;
  }
}

.latest-item {
  position: relative;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 14px;
  background: rgba(255,255,255,0.04);
  overflow: hidden;
  transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
}

.latest-item strong {
  color: var(--text);
}

.latest-item-flash {
  border-color: rgba(115, 226, 167, 0.7);
  box-shadow:
    0 0 0 1px rgba(115, 226, 167, 0.18),
    0 0 20px rgba(115, 226, 167, 0.18),
    0 10px 28px rgba(0,0,0,0.20);
  animation: latestItemPulse 0.7s ease;
}

@keyframes latestItemPulse {
  0% {
    transform: scale(0.985);
    box-shadow:
      0 0 0 0 rgba(115, 226, 167, 0.0),
      0 0 0 rgba(115, 226, 167, 0.0),
      0 10px 28px rgba(0,0,0,0.12);
  }
  35% {
    transform: scale(1.01);
    box-shadow:
      0 0 0 1px rgba(115, 226, 167, 0.25),
      0 0 28px rgba(115, 226, 167, 0.28),
      0 10px 28px rgba(0,0,0,0.20);
  }
  100% {
    transform: scale(1);
    box-shadow:
      0 0 0 1px rgba(115, 226, 167, 0.08),
      0 0 0 rgba(115, 226, 167, 0),
      0 10px 28px rgba(0,0,0,0.16);
  }
}

.hidden {
  display: none !important;
}

body.obs-mode {
  background: transparent;
}

body.obs-mode .wrap {
  max-width: none;
  padding: 0;
}

body.obs-mode .topbar {
  display: none;
}

body.obs-mode .grid {
  display: block;
}

body.obs-mode .card {
  background: rgba(10, 16, 34, 0.78);
  border: 1px solid rgba(255,255,255,0.18);
  box-shadow: none;
  border-radius: 16px;
}

body.obs-mode.view-progress #sessionCard,
body.obs-mode.view-compact #sessionCard,
body.obs-mode.view-log #logCard {
  width: 100%;
  max-width: 700px;
}

body.obs-mode.view-progress #sessionCard,
body.obs-mode.view-compact #sessionCard {
  min-height: 0;
  height: auto;
}

body.obs-mode.view-log #logCard {
  min-height: 0;
  height: auto;
}

body.obs-mode.view-progress .progress-bar,
body.obs-mode.view-compact .progress-bar {
  height: 14px;
}

body.obs-mode.view-compact #latestItem {
  margin-top: 4px;
}

body.obs-mode.view-log #log {
  height: 400px;
}

.obs-param-wrap {
  position: relative;
}

.obs-param-menu {
  margin-top: 8px;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 14px;
  background: rgba(20, 27, 52, 0.96);
  box-shadow: 0 10px 24px rgba(0,0,0,0.22);
}

.obs-check {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
  font-size: 13px;
  color: var(--text);
}

.obs-check input[type="checkbox"] {
  width: auto;
  margin: 0;
}

.card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}

.card-head h2 {
  margin: 0;
}

.log-toggle {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border: 1px solid rgba(0, 234, 255, 0.22);
  border-radius: 999px;
  background: rgba(8, 14, 34, 0.72);
  color: var(--text);
  font-size: 12px;
  line-height: 1;
  cursor: pointer;
  user-select: none;
  transition:
    border-color 0.2s ease,
    box-shadow 0.2s ease,
    background 0.2s ease,
    transform 0.2s ease;
}

.log-toggle:hover {
  border-color: rgba(0, 234, 255, 0.45);
  box-shadow:
    0 0 12px rgba(0, 234, 255, 0.16),
    inset 0 0 12px rgba(0, 234, 255, 0.05);
  transform: translateY(-1px);
}

.log-toggle input[type="checkbox"] {
  position: absolute;
  opacity: 0;
  pointer-events: none;
  width: 0;
  height: 0;
}

.log-toggle-box {
  position: relative;
  width: 18px;
  height: 18px;
  flex: 0 0 18px;
  border-radius: 6px;
  border: 1px solid rgba(0, 234, 255, 0.35);
  background: linear-gradient(180deg, rgba(12, 20, 48, 0.95), rgba(8, 14, 34, 0.95));
  box-shadow:
    inset 0 0 10px rgba(0, 234, 255, 0.06),
    0 0 8px rgba(0, 234, 255, 0.08);
  transition:
    border-color 0.2s ease,
    box-shadow 0.2s ease,
    background 0.2s ease;
}

.log-toggle-box::after {
  content: "";
  position: absolute;
  left: 5px;
  top: 2px;
  width: 5px;
  height: 9px;
  border: solid #001018;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg) scale(0);
  opacity: 0;
  transition: transform 0.18s ease, opacity 0.18s ease;
}

.log-toggle input[type="checkbox"]:checked + .log-toggle-box {
  border-color: rgba(0, 255, 156, 0.7);
  background: linear-gradient(180deg, #00eaff, #00ff9c);
  box-shadow:
    0 0 10px rgba(0, 255, 156, 0.35),
    0 0 22px rgba(0, 255, 156, 0.18);
}

.log-toggle input[type="checkbox"]:checked + .log-toggle-box::after {
  transform: rotate(45deg) scale(1);
  opacity: 1;
}

.log-toggle-text {
  color: #d9ecff;
  letter-spacing: 0.01em;
}

@media (max-width: 700px) {
  .card-head {
    flex-direction: column;
    align-items: flex-start;
  }
}

.log-toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.audio-control {
  min-width: 220px;
  padding: 10px 12px;
  border: 1px solid rgba(0, 234, 255, 0.22);
  border-radius: 999px;
  background: rgba(8, 14, 34, 0.72);
  box-shadow:
    0 0 12px rgba(0, 234, 255, 0.10),
    inset 0 0 12px rgba(0, 234, 255, 0.04);
  transition:
    border-color 0.2s ease,
    box-shadow 0.2s ease,
    transform 0.2s ease;
}

.audio-control:hover {
  border-color: rgba(0, 234, 255, 0.45);
  box-shadow:
    0 0 16px rgba(0, 234, 255, 0.16),
    inset 0 0 12px rgba(0, 234, 255, 0.05);
  transform: translateY(-1px);
}

.audio-label {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 8px;
  font-size: 12px;
  color: #d9ecff;
  letter-spacing: 0.01em;
}

.audio-value {
  color: var(--accent);
  font-weight: 700;
  min-width: 42px;
  text-align: right;
}

#audioSlider,
#volumeSlider {
  width: 100%;
}

#volumeSlider {
  appearance: none;
  height: 6px;
  border-radius: 999px;
  border: none;
  padding: 0;
  background: linear-gradient(
    90deg,
    rgba(0, 234, 255, 0.20),
    rgba(0, 255, 156, 0.25)
  );
  box-shadow: inset 0 0 8px rgba(0, 234, 255, 0.18);
}

#volumeSlider::-webkit-slider-runnable-track {
  height: 6px;
  border-radius: 999px;
  background: transparent;
}

#volumeSlider::-webkit-slider-thumb {
  appearance: none;
  width: 16px;
  height: 16px;
  margin-top: -5px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.55);
  background: linear-gradient(180deg, #00eaff, #00ff9c);
  box-shadow:
    0 0 10px rgba(0, 255, 156, 0.35),
    0 0 20px rgba(0, 234, 255, 0.22);
  cursor: pointer;
}

#volumeSlider::-moz-range-track {
  height: 6px;
  border-radius: 999px;
  border: none;
  background: linear-gradient(
    90deg,
    rgba(0, 234, 255, 0.20),
    rgba(0, 255, 156, 0.25)
  );
  box-shadow: inset 0 0 8px rgba(0, 234, 255, 0.18);
}

#volumeSlider::-moz-range-thumb {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.55);
  background: linear-gradient(180deg, #00eaff, #00ff9c);
  box-shadow:
    0 0 10px rgba(0, 255, 156, 0.35),
    0 0 20px rgba(0, 234, 255, 0.22);
  cursor: pointer;
}

@media (max-width: 700px) {
  .log-toolbar {
    width: 100%;
    justify-content: stretch;
  }

  .audio-control {
    width: 100%;
    min-width: 0;
  }
}

.obs-toast-layer {
  position: fixed;
  top: 24px;
  right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: min(420px, calc(100vw - 32px));
  pointer-events: none;
}

.obs-toast {
  position: relative;
  overflow: hidden;
  border-radius: 18px;
  padding: 14px 16px;
  border: 1px solid rgba(255,255,255,0.18);
  background: rgba(8, 14, 34, 0.88);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: var(--text);
  box-shadow:
    0 10px 30px rgba(0,0,0,0.35),
    0 0 18px rgba(0, 234, 255, 0.12);
  transform: translateX(24px) scale(0.98);
  opacity: 0;
  animation: obsToastIn 240ms ease forwards;
}

.obs-toast.hide {
  animation: obsToastOut 220ms ease forwards;
}

.obs-toast::before {
  content: "";
  position: absolute;
  inset: 0 auto 0 0;
  width: 5px;
  background: var(--toast-accent, var(--accent));
  box-shadow: 0 0 14px var(--toast-accent, var(--accent));
}

.obs-toast::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(135deg, rgba(255,255,255,0.06), transparent 45%),
    radial-gradient(circle at top right, rgba(255,255,255,0.10), transparent 32%);
}

.obs-toast-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 6px;
}

.obs-toast-title {
  font-size: 16px;
  font-weight: 700;
  line-height: 1.2;
  color: #ffffff;
}

.obs-toast-badge {
  flex: 0 0 auto;
  padding: 4px 8px;
  border-radius: 999px;

  );

  reconnectAttempts += 1;

function getHintKey(hint) {
  return [
    hint.finding_player ?? "",
    hint.location ?? "",
    hint.receiving_player ?? "",
    hint.item ?? ""
  ].join(":");
}


function isHintImportantToYou(hint) {
  if (!hint || typeof hint !== "object") return false;

  const flags = Number(hint.flags ?? hint.item_flags ?? NaN);

  if (Number.isFinite(flags)) {
    return (flags & 1) !== 0 || (flags & 2) !== 0;
  }

  return hint.important === true;
}

function getHintStatus(hint) {
  if (hint.found === true) return "found";
  return "unfound";
}

function upsertHints(newHints) {
  if (!Array.isArray(newHints) || !newHints.length) return;

  const byKey = new Map(hintsState.map((hint) => [getHintKey(hint), hint]));

  for (const hint of newHints) {
    const key = getHintKey(hint);
    byKey.set(key, { ...(byKey.get(key) || {}), ...hint });
  }

  hintsState = Array.from(byKey.values());
  renderHints();
}

const LAST_AP_URL_KEY = "lastApUrl";

function saveLastApUrl(url) {
  const normalizedUrl = normalizeApUrl(url);

  if (!normalizedUrl) return;

  localStorage.setItem(LAST_AP_URL_KEY, normalizedUrl);
}

function loadLastApUrl() {
  const saved = localStorage.getItem(LAST_AP_URL_KEY);

  if (!saved) return;

  apUrlEl.value = normalizeApUrl(saved);
}

// REPLACE your current renderHints() with this
function renderHints() {
  if (!hintsEl) return;

  hintsEl.innerHTML = "";

  if (!hintsState.length) {
    hintsEl.innerHTML = '<div class="muted small">No active hints yet.</div>';
    if (hintsSummaryEl) hintsSummaryEl.textContent = "No hints yet.";
    return;
  }

  const myImportantCount = hintsState.filter(isHintImportantToYou).length;
  const foundCount = hintsState.filter((hint) => getHintStatus(hint) === "found").length;
  const visibleHints = hideFoundHints
    ? hintsState.filter((hint) => getHintStatus(hint) !== "found")
    : hintsState;

  if (hintsSummaryEl) {
    const hiddenText = hideFoundHints ? ` • showing ${visibleHints.length}` : "";
    hintsSummaryEl.textContent =
      `${hintsState.length} hint(s) • ${foundCount} found • ${myImportantCount} important${hiddenText}`;
  }

  if (!visibleHints.length) {
    hintsEl.innerHTML = '<div class="muted small">No unfound hints to show.</div>';
    return;
  }

  const sortedHints = [...visibleHints].sort((a, b) => {
    const aFound = getHintStatus(a) === "found" ? 1 : 0;
    const bFound = getHintStatus(b) === "found" ? 1 : 0;
    if (aFound !== bFound) return aFound - bFound;

    const aImportant = isHintImportantToYou(a) ? 1 : 0;
    const bImportant = isHintImportantToYou(b) ? 1 : 0;
    if (aImportant !== bImportant) return bImportant - aImportant;

    return 0;
  });

  for (const hint of sortedHints) {
    const div = document.createElement("div");

    const important = isHintImportantToYou(hint);
    const status = getHintStatus(hint);

    const locationGameSlot = hint.finding_player ?? connected?.slot;
    const itemGameSlot = hint.receiving_player ?? connected?.slot;

    const locationName =
      hint._hint_text_location_name ||
      lookupLocationName(hint.location, locationGameSlot);

    const itemName =
      hint._hint_text_item_name ||
      lookupItemName(hint.item, itemGameSlot);

    const finderName =
      hint._hint_text_owner_name ||
      getPlayerName(hint.finding_player) ||
      `Slot ${hint.finding_player ?? "?"}`;

    const receiverName =
      hint._hint_text_owner_name ||
      getPlayerName(hint.receiving_player) ||
      `Slot ${hint.receiving_player ?? "?"}`;

    const importantBadge = important
      ? '<span class="hint-badge hint-badge-important">Important</span>'
      : "";

    div.className = `hint-item hint-${status}${important ? " hint-important" : ""}`;

let audioCtx = null;
let audioDebugEnabled = false;

function audioDebug(message, kind = "small") {
  if (!audioDebugEnabled) return;
  log(`[AUDIO] ${message}`, kind);
}

function getAudioCtx() {
  audioDebug(`getAudioCtx() called. Existing ctx: ${!!audioCtx}`);

  if (!audioCtx) {
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    if (!AudioContextClass) {
      audioDebug("AudioContext not supported in this browser.", "bad");
      return null;
    }

    audioCtx = new AudioContextClass();
    audioDebug(`Created AudioContext. Initial state: ${audioCtx.state}`);
  }

  if (audioCtx.state === "suspended") {
    audioDebug("AudioContext is suspended. Attempting resume...");
    audioCtx.resume()
      .then(() => {
        audioDebug(`AudioContext resumed successfully. New state: ${audioCtx.state}`, "good");
      })
      .catch((err) => {
        audioDebug(`AudioContext resume failed: ${err?.message || err}`, "bad");
      });
  } else {
    audioDebug(`AudioContext already active. State: ${audioCtx.state}`, "good");
  }

  return audioCtx;
}

function playTone({
  frequency = 440,
  type = "sine",
  duration = 0.12,
  volume = 0.034,
  delay = 0
} = {}) {
  audioDebug(
    `playTone() requested: freq=${frequency}, type=${type}, duration=${duration}, volume=${volume}, delay=${delay}`
  );

  const ctx = getAudioCtx();
  if (!ctx) {
    audioDebug("playTone() aborted: no audio context.", "bad");
    return;
  }

  if (volumeLevel === 0) {
    audioDebug("playTone() aborted: volumeLevel is 0 (muted).", "bad");
    return;
  }

  const finalVolume = volume * volumeLevel;
  const now = ctx.currentTime + delay;

  audioDebug(
    `Scheduling tone. ctx.state=${ctx.state}, ctx.currentTime=${ctx.currentTime.toFixed(4)}, now=${now.toFixed(4)}, volumeLevel=${volumeLevel}, finalVolume=${finalVolume.toFixed(5)}`
  );

  try {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = type;
    osc.frequency.setValueAtTime(frequency, now);

    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(finalVolume, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.onended = () => {
      audioDebug(`Tone ended: freq=${frequency}`, "good");
    };

    osc.start(now);
    osc.stop(now + duration + 0.02);

    audioDebug(`Tone started/scheduled successfully: freq=${frequency}`, "good");
  } catch (err) {
    audioDebug(`playTone() error: ${err?.message || err}`, "bad");
  }
}

function setSessionCookie(name, value) {

function getCookie(name) {
  const target = `${encodeURIComponent(name)}=`;
  const parts = document.cookie.split(";");

  for (const part of parts) {
    const trimmed = part.trim();
    if (trimmed.startsWith(target)) {
      return decodeURIComponent(trimmed.slice(target.length));
    }
  }

  return "";
}

function clearCookie(name) {
  document.cookie = `${encodeURIComponent(name)}=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT; SameSite=Lax`;
}

function generateUuid() {
  if (window.crypto?.randomUUID) {
    return window.crypto.randomUUID();
  }

  return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, (c) => {
    const r = Math.random() * 16 | 0;
    const v = c === "x" ? r : (r & 0x3) | 0x8;
    return v.toString(16);
  });
}

function getGameForPlayerSlot(slot) {
  const numericSlot = Number(slot);

  if (Number.isFinite(numericSlot) && playerGameMap.has(numericSlot)) {
    return playerGameMap.get(numericSlot);
  }

  if (connected?.slot_info?.[numericSlot]?.game) {
    return connected.slot_info[numericSlot].game;

  // precollected/system items and "your own" checks often need this fallback
  return getOwnGame();

function getPlayerName(slot) {
  const numericSlot = Number(slot);

  const players = getPlayersList();
  const player = players.find((p) => Number(p.slot) === numericSlot);

  return player?.alias || player?.name || `Player ${numericSlot}`;
}

function lookupItemName(itemId, playerSlot) {
  const game = getGameForPlayerSlot(playerSlot);
  if (!game) return `Item ${itemId}`;

  const gameData = dataPackage?.games?.[game];
  const itemIdToName = gameData?.item_name_to_id
    ? Object.fromEntries(
        Object.entries(gameData.item_name_to_id).map(([name, id]) => [String(id), name])
      )
    : {};

  return itemIdToName[String(itemId)] || `Item ${itemId}`;
}

function lookupLocationName(locationId, playerSlot) {
  const game = getGameForPlayerSlot(playerSlot);
  if (!game) return `Location ${locationId}`;

  const gameData = dataPackage?.games?.[game];
  const locationIdToName = gameData?.location_name_to_id
    ? Object.fromEntries(
        Object.entries(gameData.location_name_to_id).map(([name, id]) => [String(id), name])
      )
    : {};

  return locationIdToName[String(locationId)] || `Location ${locationId}`;
}

function formatPrintJson(parts) {
  if (!Array.isArray(parts)) return String(parts ?? "");

  return parts.map((part) => {
    if (!part || typeof part !== "object") {
      return String(part ?? "");
    }

    if (part.type === "item_id") {
      const itemId = Number(part.text);
      const playerSlot =
        part.player === 0 || part.player == null ? connected?.slot : part.player;

      return `${lookupItemName(itemId, playerSlot)} [${itemId}]`;
    }

    if (part.type === "location_id") {
      const locationId = Number(part.text);
      const playerSlot = part.player === 0 || part.player == null ? connected?.slot : part.player;

      return `${lookupLocationName(locationId, playerSlot)} [${locationId}]`;
    }

    if (part.type === "player_id") {
      const slot = Number(part.text);
      const players = connected?.players || roomInfo?.players || [];
      const player = players.find((p) => Number(p.slot) === slot);
      return player?.alias || player?.name || `Player ${slot}`;
    }

    return part.text ?? "";
  }).join("");
}

function extractHintFromPrintJson(data) {
  if (!Array.isArray(data) || !data.length) return null;

  const text = data
    .map((part) => {
      if (typeof part?.text === "string") return part.text;
      return "";
    })
    .join("");

  if (!text.startsWith("[Hint]:")) return null;

  // Example:
  // [Hint]: IssyWind's Progressive Bow [2322489] is at Forsaken Fortress - Phantom Ganon [2326642] in IssyWind's World. (found)
  // [Hint]: IssyWind's Progressive Bow [2322489] is at Tower of the Gods - Big Key Chest [2326639] in IssyWind's World at Tower of the Gods Sector. (priority)

  const itemMatch = text.match(/\[Hint\]:\s(.+?)\s\[(\d+)\]\sis at\s(.+?)\s\[(\d+)\]\sin\s(.+?)'s World/i);
  if (!itemMatch) return null;

  const [, rawItemName, rawItemId, rawLocationName, rawLocationId, rawOwnerName] = itemMatch;

  const lower = text.toLowerCase();

  let found = false;
  if (lower.includes("(found)")) found = true;

  const important = lower.includes("(priority)");

  // Try to resolve owner slot from player list
  let receivingPlayer = null;
  if (Array.isArray(roomInfo?.players)) {
    const owner = roomInfo.players.find((p) => p?.alias === rawOwnerName || p?.name === rawOwnerName);
    if (owner) receivingPlayer = owner.slot;
  }

  // fallback: if the owner name is us, use our slot
  if (receivingPlayer == null && connected?.slot != null) {
    const myName = slotNameEl?.value?.trim();
    if (rawOwnerName === myName) {
      receivingPlayer = connected.slot;
    }
  }

  return {
    item: Number(rawItemId),
    location: Number(rawLocationId),
    receiving_player: receivingPlayer,
    finding_player: receivingPlayer,
    found,
    important,
    _hint_text_item_name: rawItemName,
    _hint_text_location_name: rawLocationName,
    _hint_text_owner_name: rawOwnerName
  };
}

  function handleApPackets(packets, raw) {
    if (!packets) {
      log(`Raw: ${raw}`);
      return;
    }

    if (!Array.isArray(packets)) {
      packets = [packets];
    }

    for (const packet of packets) {
const cmd = packet.cmd || "Unknown";

if (cmd === "Bounced" && !showBounced) {
  return; // completely hide bounced packets
}

log(`Packet: ${cmd}`);

if (cmd === "RoomInfo") {
  roomInfo = packet;
  populateGameDropdown();
  rebuildPlayerGameMap();
  renderRoom();
  renderPlayers();
  log(`RoomInfo fields: ${Object.keys(packet).join(", ")}`, "good");
  log("RoomInfo received ✔", "good");
}

if (cmd === "Connected") {
  connected = packet;
  rebuildPlayerGameMap();
  renderPlayers();
  renderSession();
  updateProgressDisplay();
  renderHints();
  log(`Connected fields: ${Object.keys(packet).join(", ")}`, "good");
  log(`Authenticated as slot ${packet.slot} on team ${packet.team}.`, "good");

const hintKey = `_read_hints_${packet.team}_${packet.slot}`;

log(`Requesting stored hints from server using key: ${hintKey}`, "good");

sendBrowserMessage({
  type: "send-ap",
  payload: [
    {
      cmd: "Get",
      keys: [hintKey]
    },
    {
      cmd: "SetNotify",
      keys: [hintKey]
    }
  ]
});


}

if (cmd === "Retrieved") {
  const hintKey = connected ? `_read_hints_${connected.team}_${connected.slot}` : null;

  if (
    hintKey &&
    packet.keys &&
    Object.prototype.hasOwnProperty.call(packet.keys, hintKey)
  ) {
    const hints = Array.isArray(packet.keys[hintKey])
      ? packet.keys[hintKey]
      : [];

    setHints(hints);
    log(`Retrieved ${hints.length} hint(s).`, "good");
  }
}

if (cmd === "SetReply") {
  log(`SetReply packet: ${JSON.stringify(packet)}`);

  const hintKey = connected ? `_read_hints_${connected.team}_${connected.slot}` : null;

  if (hintKey && packet.key === hintKey) {
    const hints = Array.isArray(packet.value)
      ? packet.value
      : [];

    setHints(hints);
    log(`Hint list updated (${hints.length} hint(s)).`, "good");
  }
}

if (cmd === "Bounced") {
  if (!showBounced) return;

  log(`Bounced: ${JSON.stringify(packet.data ?? {})}`);
}

      if (cmd === "DataPackage") {
        dataPackage = packet.data || {};
        log(`DataPackage received. Games loaded: ${Object.keys(dataPackage.games || {}).length}`, "good");
      }

      if (cmd === "ConnectionRefused") {
        log(`Connection refused: ${(packet.errors || []).join(", ") || "Unknown reason"}`, "bad");
      }

if (cmd === "ReceivedItems") {
  const newItems = Array.isArray(packet.items) ? packet.items : [];

  for (const item of newItems) {
    receivedItems.push(item);
    renderLatestItem(item);
    flashLatestItem();
    showObsItemToast(item);
  }

  renderItems();
  renderSession();
  updateProgressDisplay();
  log(`Received ${newItems.length} item(s).`, "good");
}

      if (cmd === "Print") {
        log(packet.text || "[Print packet]");
      }

if (cmd === "PrintJSON") {
  const rendered = formatPrintJson(packet.data || []);
  log(rendered || JSON.stringify(packet.data || packet, null, 2));

  const parsedHint = extractHintFromPrintJson(packet.data || []);
  if (parsedHint) {
    setHints([parsedHint]);
    log("Hint added to hints panel from PrintJSON.", "good");
  }
}

if (cmd === "RoomUpdate") {
  const next = { ...(connected || {}), ...packet };

  if (Array.isArray(packet.checked_locations)) {
    const prevChecked = Array.isArray(connected?.checked_locations)
      ? connected.checked_locations
      : [];

    next.checked_locations = [...new Set([...prevChecked, ...packet.checked_locations])];
  }

  if (!Array.isArray(packet.missing_locations) && Array.isArray(connected?.missing_locations)) {
    next.missing_locations = connected.missing_locations;
  }

  connected = next;
  rebuildPlayerGameMap();
  renderPlayers();
  renderSession();
  updateProgressDisplay();
}

      if (cmd === "InvalidPacket") {
        log(`Invalid packet (${packet.type} / ${packet.original_cmd}): ${packet.text}`, "bad");
      }
    }
  }

function getItemClassification(item) {
  const flags = Number(item?.flags ?? 0);

  if (flags & 4) {
    return { key: "trap", label: "Trap" };
  }

  if (flags & 1) {
    return { key: "progression", label: "Progression" };
  }

  if (flags & 2) {
    return { key: "useful", label: "Useful" };
  }

  return { key: "filler", label: "Filler" };
}

function getPlayerNameBySlot(slot) {
  if (slot === 0) return "System";
  return getPlayerName(slot) || `Slot ${slot ?? "?"}`;
}

function playToastSound(classificationKey) {

  if (classificationKey === "trap") {
    playTone({ frequency: 240, type: "sawtooth", duration: 0.12, volume: 0.028, delay: 0.00 });
    playTone({ frequency: 180, type: "triangle", duration: 0.18, volume: 0.018, delay: 0.05 });
    return;
  }

  if (classificationKey === "progression") {
    playTone({ frequency: 987.77, type: "sine", duration: 0.10, volume: 0.028, delay: 0.00 });
    playTone({ frequency: 1318.51, type: "sine", duration: 0.12, volume: 0.022, delay: 0.05 });
    playTone({ frequency: 1567.98, type: "sine", duration: 0.14, volume: 0.018, delay: 0.10 });
    return;
  }

  if (classificationKey === "useful") {
    playTone({ frequency: 880, type: "sine", duration: 0.09, volume: 0.024, delay: 0.00 });
    playTone({ frequency: 1174.66, type: "sine", duration: 0.08, volume: 0.018, delay: 0.04 });
    return;
  }

  playItemPing();
}

function showObsItemToast(item) {
  if (!isAutoMode || !obsToastLayerEl) return;
  if (currentView !== "item-alert") return;
  if (item.location === -2 && item.player === 0) return;

  const classification = getItemClassification(item);

  const itemLookupSlot = connected?.slot;
  const itemName = lookupItemName(item.item, itemLookupSlot);

  const senderName = getPlayerNameBySlot(item.player);
  const receiverName = getPlayerNameBySlot(connected?.slot);

  const toast = document.createElement("div");
  toast.className = `obs-toast obs-toast-${classification.key}`;

  toast.innerHTML = `
    <div class="obs-toast-header">
      <div class="obs-toast-title">${escapeHtml(itemName)}</div>
      <div class="obs-toast-badge">${escapeHtml(classification.label)}</div>
    </div>
    <div class="obs-toast-meta">
      <div><strong>From:</strong> ${escapeHtml(senderName)}</div>
      <div><strong>To:</strong> ${escapeHtml(receiverName)}</div>
      <div class="muted-line">Item ID: ${escapeHtml(item.item ?? "?")}</div>
    </div>
  `;

  obsToastLayerEl.appendChild(toast);
  playToastSound(classification.key);

  const removeToast = () => {
    toast.classList.add("hide");
    setTimeout(() => {
      toast.remove();
    }, 220);
  };

  setTimeout(removeToast, 3800);
}

function updateProgressDisplay() {
  if (!progressFillEl || !progressTextEl) return;
  if (!connected) return;

  const checked = Number(connected?.checked_locations?.length || 0);
  const total = Number(connected?.missing_locations?.length || 0) + checked;
  const percent = total > 0 ? (checked / total) * 100 : 0;

  progressTextEl.textContent = `${checked} / ${total} checks`;

  // update bar
  progressFillEl.style.width = `${percent.toFixed(1)}%`;

  // 👇 ADD THIS BLOCK HERE
  progressFillEl.classList.remove("bump");
  void progressFillEl.offsetWidth;
  progressFillEl.classList.add("bump");

  setTimeout(() => {
    progressFillEl.classList.remove("bump");
  }, 220);
}

function normalizeApUrl(url) {
  url = String(url || "").trim();

  // If no protocol at all → default to wss://
  if (!/^wss?:\/\//i.test(url)) {
    url = "wss://" + url;
  }

  // If user typed ws://archipelago.gg → upgrade to wss://
  if (/^ws:\/\/archipelago\.gg(?::\d+)?$/i.test(url)) {
    url = url.replace(/^ws:\/\//i, "wss://");
  }

  return url;
}

document.getElementById("connectBtn").addEventListener("click", () => {
  audioDebug("Connect button clicked", "good");
  getAudioCtx();
  playConnectChime();

  clearReconnectTimer();
  manualDisconnect = false;
  shouldAutoReconnect = true;
  reconnectAttempts = 0;
  hasEverConnected = false;

  const normalizedUrl = normalizeApUrl(apUrlEl.value);
  apUrlEl.value = normalizedUrl;

  saveLastApUrl(normalizedUrl);

  setStatus(`Connecting to ${shortUrl(normalizedUrl)}...`, "connecting");
  log(`Connecting to Archipelago socket: ${normalizedUrl}`, "good");

  sendBrowserMessage({
    type: "connect-ap",
    apUrl: normalizedUrl
  });
});

function sendConnectPacket() {
  audioDebug("Send Connect Packet clicked", "good");

  if (!currentUuid) {
    audioDebug("No UUID found. Creating/loading UUID...");
    loadOrCreateUuid();
  }

  getAudioCtx();
  playConnectChime();

  manualDisconnect = false;
  shouldAutoReconnect = true;
  clearReconnectTimer();

  const payload = [
    {
      cmd: "Connect",
      game: String(gameNameEl.value || "").trim(),
      name: slotNameEl.value.trim(),
      password: passwordEl.value,
      uuid: currentUuid,
      version: { major: 0, minor: 6, build: 0, class: "Version" },
      items_handling: 7,
      tags: ["Tracker"]
    }
  ];

  audioDebug(`Connect packet prepared for slot="${slotNameEl.value.trim()}" game="${String(gameNameEl.value || "").trim()}"`);

  if (connected) {
    audioDebug("Already authenticated. Reconnect flow triggered.", "bad");

    log("Already authenticated. Reconnecting before switching game/slot...", "bad");
    pendingConnectPayload = payload;
    resetSessionState();
    updateProgressDisplay();

    sendBrowserMessage({ type: "disconnect-ap" });

    setTimeout(() => {
      const normalizedUrl = normalizeApUrl(apUrlEl.value);
      apUrlEl.value = normalizedUrl;
      sendBrowserMessage({
        type: "connect-ap",
        apUrl: normalizedUrl
      });
    }, 250);

    return;
  }

  pendingConnectPayload = payload;

  log(`Sending Connect packet with session UUID ${currentUuid}`, "good");
  log(`Using UUID: ${currentUuid}`, "good");
  audioDebug("Calling sendAp() with Connect packet", "good");
  sendAp(payload);
}

document.getElementById("loginBtn").addEventListener("click", sendConnectPacket);


document.getElementById("disconnectBtn").addEventListener("click", () => {
  manualDisconnect = true;
  shouldAutoReconnect = false;
  reconnectAttempts = 0;
  hasEverConnected = false;
  clearReconnectTimer();

  pendingConnectPayload = null;

  setStatus("Disconnecting...", "connecting");
  log("Manual disconnect requested. Auto-reconnect disabled.", "bad");

  sendBrowserMessage({
    type: "disconnect-ap"
  });
});



    document.getElementById("syncBtn").addEventListener("click", () => {
      sendAp([{ cmd: "Sync" }]);
    });

    document.getElementById("sendChatBtn").addEventListener("click", () => {
      const text = chatInputEl.value.trim();
      if (!text) return;

      sendAp([{ cmd: "Say", text }]);
      chatInputEl.value = "";
    });

	
loadOrCreateUuid();
ensureBrowserSocket();
renderRoom();
renderPlayers();
renderSession();
renderItems();
renderLatestItem();
applyViewMode();
applyAutoMode();

window.addEventListener("DOMContentLoaded", () => {
  applyAutoMode();
});

// unlock audio on first user interaction
document.addEventListener("click", () => {
  getAudioCtx();
}, { once: true });
